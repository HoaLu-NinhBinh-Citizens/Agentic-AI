# MCP Server Configuration
# Phase 2A - MCP Connectivity & Discovery
# Phase 2C - AI_SUPPORT embedded engineering intelligence server

servers:
  # AI_SUPPORT - Embedded engineering intelligence (this project)
  # Connects Cursor to AI_SUPPORT's hardware validation, reasoning, and KB
  - name: "ai_support"
    command: "python"
    args:
      - "-m"
      - "infrastructure.mcp.ai_support_server"
    transport: "stdio"
    enabled: false

  # Filesystem server - provides file system operations
  # Note: On Windows, use a valid Windows path like %TEMP% or an absolute path
  - name: "filesystem"
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "C:\\Users\\thang\\Desktop"
    transport: "stdio"
    enabled: false

  # Git server - provides git operations
  - name: "git"
    command: "uvx"
    args:
      - "mcp-server-git"
    transport: "stdio"
    enabled: false

  # Terminal server - provides terminal/shell operations
  - name: "terminal"
    command: "python"
    args:
      - "-m"
      - "mcp_server_terminal"
    transport: "stdio"
    enabled: false
