# AI Support Rules Configuration
# Override with: AI_SUPPORT_CONFIG=/path/to/config.yaml or env vars

rules:
  enabled: true
  severity_threshold: info  # hint, info, warning, error
  max_function_lines: 50
  max_nesting_depth: 3
  max_cyclomatic_complexity: 10

ml_rules:
  check_data_leakage: true
  check_device_mismatch: true
  check_no_grad: true
  check_deterministic: true
  check_loss_function: true
  check_hardcoded_params: true

indexing:
  incremental: true
  watch_mode: false
  debounce_seconds: 2.0
  concurrency: 4
  max_file_size_mb: 10

output:
  format: rich  # rich, json, plain, markdown
  include_code_context: 3
  show_confidence: true
  color: true
