version: '3.8'

services:
  ai-support:
    build:
      context: .
      target: development
    image: aisupport/ai-support:dev
    container_name: ai-support-dev
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - AI_SUPPORT_DEV_MODE=1
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    command: python -m pytest tests/ -v --watch

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-dev
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

volumes:
  ollama-data:
