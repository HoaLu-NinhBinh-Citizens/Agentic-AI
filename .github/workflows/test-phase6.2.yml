"""GitHub Actions CI Pipeline for Phase 6.2 Flash Infrastructure.

This workflow:
1. Runs unit tests with coverage
2. Runs integration tests
3. Runs chaos tests
4. Runs benchmarks
5. Reports coverage to Codecov
"""

name: Phase 6.2 Flash Infrastructure Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/domain/hardware/flash/**'
      - 'tests/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/domain/hardware/flash/**'
      - 'tests/**'
      - 'scripts/**'

env:
  Python_VERSION: '3.11'
  MIN_COVERAGE: 85

jobs:
  # ===========================================================================
  # Unit Tests
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.Python_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-cov pytest-timeout
          pip install aiosqlite aiofiles
      
      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ \
            --cov=src.domain.hardware.flash \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            -v --timeout=300
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          flags: unittests
          name: flash-infrastructure
  
  # ===========================================================================
  # Integration Tests
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.Python_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-timeout
      
      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ \
            -v --timeout=600
      
      - name: Upload integration test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            tests/integration/*.log
            pytest.log
  
  # ===========================================================================
  # Chaos Tests
  # ===========================================================================
  chaos-tests:
    name: Chaos Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.Python_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio pytest-timeout
      
      - name: Run chaos tests
        run: |
          python -m pytest tests/chaos/ \
            -v --timeout=600
      
      - name: Upload chaos test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-logs
          path: |
            tests/chaos/*.log
            chaos_logs/*.log
  
  # ===========================================================================
  # Benchmarks
  # ===========================================================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.Python_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run benchmarks
        run: |
          python scripts/run_benchmarks.py benchmarks/results.json
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results.json
      
      - name: Check benchmark thresholds
        run: |
          python -c "
          import json
          with open('benchmarks/results.json') as f:
              data = json.load(f)
          
          all_passed = all(r['passed'] for r in data['results'])
          print(f\"Benchmarks passed: {data['summary']['passed']}/{data['summary']['total']}\")
          
          if not all_passed:
              print(\"Some benchmarks failed!\")
              for r in data['results']:
                  if not r['passed']:
                      print(f\"  FAILED: {r['name']}\")
              exit(1)
          else:
              print(\"All benchmarks passed!\")
          "
  
  # ===========================================================================
  # All Tests Combined
  # ===========================================================================
  test-all:
    name: All Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, chaos-tests, benchmarks]
    
    steps:
      - name: All tests completed
        run: |
          echo "All Phase 6.2 tests completed successfully!"
          echo "Coverage report available in unit-tests job"
          echo "Benchmark results available in benchmarks job"
