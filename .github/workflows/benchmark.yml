name: Benchmark

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run benchmarks
        run: python -m pytest benchmarks/ -v
