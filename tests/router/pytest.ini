[pytest]
minversion = 6.0
addopts = -ra -q --strict-markers
testpaths = tests/router
asyncio_mode = auto

markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    concurrency: Concurrency and race condition tests
    property: Property-based tests with Hypothesis
    chaos: Chaos tests for failure scenarios

[coverage:run]
source = src/infrastructure/router
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
