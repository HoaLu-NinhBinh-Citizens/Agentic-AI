apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: aisupport
type: Opaque
stringData:
  redis-password: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-certs
  namespace: aisupport
type: kubernetes.io/tls
data:
  # Generate with:
  # openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=redis"
  # cat cert.pem | base64 -w0
  # cat key.pem | base64 -w0
  # For production, use cert-manager or external secrets management
  redis.crt: "PLACEHOLDER_BASE64_CERT"
  redis.key: "PLACEHOLDER_BASE64_KEY"
  ca.crt: "PLACEHOLDER_BASE64_CA_CERT"
