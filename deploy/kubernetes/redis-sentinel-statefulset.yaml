apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sentinel
  namespace: aisupport
  labels:
    app: redis
    component: sentinel
spec:
  serviceName: redis-sentinel
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: redis
      component: sentinel
  template:
    metadata:
      labels:
        app: redis
        component: sentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "26379"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: sentinel
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-sentinel
            - /usr/local/etc/redis/sentinel.conf
          ports:
            - name: sentinel
              containerPort: 26379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -p
                - "26379"
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -p
                - "26379"
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: redis-password
          volumeMounts:
            - name: sentinel-config
              mountPath: /usr/local/etc/redis
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: sentinel-config
          configMap:
            name: redis-config
            items:
              - key: sentinel.conf
                path: sentinel.conf
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: aisupport
  labels:
    app: redis
    component: sentinel
spec:
  type: ClusterIP
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
      protocol: TCP
  selector:
    app: redis
    component: sentinel
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aisupport
  labels:
    app: redis
    component: replica
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  clusterIP: None
  selector:
    app: redis
    component: replica
